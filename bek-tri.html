<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bek's Tri Tracker — Sept 12</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,300&display=swap" rel="stylesheet">
<style>
:root {
  --swim: #0e7490; --swim-bg: #ecfeff;
  --bike: #1d4ed8; --bike-bg: #eff6ff;
  --run:  #b45309; --run-bg:  #fffbeb;
  --str:  #7c3aed; --str-bg:  #f5f3ff;
  --brick:#be185d; --brick-bg:#fdf2f8;
  --rest: #6b7280; --rest-bg: #f9fafb;
  --race: #dc2626; --race-bg: #fef2f2;
  --done: #16a34a;
  --ink:  #1a1a1a;
  --paper:#faf9f7;
  --cream:#f3f0ea;
  --border:#e2ddd5;
  --muted:#78716c;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Mono',monospace;background:var(--paper);color:var(--ink);min-height:100vh}

header{background:var(--ink);color:#fff;padding:2rem 2rem 1.5rem;position:relative;overflow:hidden}
header::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 40px,rgba(255,255,255,.03) 40px,rgba(255,255,255,.03) 41px)}
.header-inner{position:relative;max-width:900px;margin:0 auto}
.race-label{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:.5rem}
h1{font-family:'Fraunces',serif;font-size:clamp(1.8rem,5vw,3rem);font-weight:700;line-height:1.1;margin-bottom:.75rem}
h1 em{font-style:italic;font-weight:300}
.header-meta{display:flex;gap:2rem;align-items:center;flex-wrap:wrap;font-size:11px;color:rgba(255,255,255,.6)}
.header-meta strong{color:#fff}
.header-tag{background:rgba(220,38,38,.25);color:#fca5a5;font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:2px 8px;border-radius:3px}

.cd-bar{background:#111827;border-bottom:1px solid #374151;padding:1rem 2rem}
.cd-inner{max-width:900px;margin:0 auto;display:flex;align-items:center;gap:2rem;flex-wrap:wrap}
.cd-digits{display:flex;align-items:flex-end;gap:2px}
.cd-unit{text-align:center}
.cd-num{font-size:28px;font-weight:500;color:#fff;line-height:1;letter-spacing:-1px}
.cd-lbl{font-size:8px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.07em;display:block;margin-top:2px}
.cd-colon{font-size:22px;color:#374151;padding-bottom:8px}
.cd-phase-text{font-size:11px;color:rgba(255,255,255,.5)}
.cd-phase-text strong{color:#fff}

.progress-section{background:var(--cream);border-bottom:1px solid var(--border);padding:1.25rem 2rem}
.progress-inner{max-width:900px;margin:0 auto}
.progress-stats{display:flex;gap:2rem;flex-wrap:wrap;margin-bottom:.75rem;font-size:11px;color:var(--muted)}
.progress-stats span strong{color:var(--ink);font-size:18px;display:block;line-height:1.2}
.progress-bar-wrap{background:#ddd9d0;border-radius:2px;height:6px;overflow:hidden}
.progress-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,#0e7490,#1d4ed8,#b45309);transition:width .6s ease}
.disc-bars{display:flex;gap:1rem;margin-top:.75rem;flex-wrap:wrap}
.disc-bar{display:flex;align-items:center;gap:.5rem;font-size:10px}
.disc-bar-track{width:80px;height:4px;background:#ddd9d0;border-radius:2px;overflow:hidden}
.disc-bar-fill{height:100%;border-radius:2px;transition:width .4s ease}

.phase-nav{background:#fff;border-bottom:1px solid var(--border);padding:0 2rem;overflow-x:auto}
.phase-nav-inner{max-width:900px;margin:0 auto;display:flex}
.phase-btn{background:none;border:none;cursor:pointer;font-family:'DM Mono',monospace;font-size:11px;padding:.75rem 1.25rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.phase-btn.active{color:var(--ink);border-bottom-color:var(--ink)}
.phase-btn:hover:not(.active){color:var(--ink)}

main{max-width:900px;margin:0 auto;padding:1.5rem 2rem 4rem}
.phase-note{background:var(--cream);border:1px solid var(--border);border-radius:4px;padding:1rem 1.25rem;font-size:12px;line-height:1.7;color:var(--muted);margin-bottom:1.5rem}
.phase-note strong{color:var(--ink)}

.week{margin-bottom:1rem;border:1px solid var(--border);border-radius:6px;overflow:hidden}
.week-header{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1rem;background:#fff;cursor:pointer;transition:background .1s}
.week-header:hover{background:var(--cream)}
.week-label{font-size:12px;font-weight:500;letter-spacing:.05em}
.week-dates{font-size:10px;color:var(--muted)}
.week-progress{display:flex;align-items:center;gap:.75rem}
.week-pips{display:flex;gap:3px}
.pip{width:8px;height:8px;border-radius:50%;border:1.5px solid var(--border);background:#fff;transition:all .15s}
.pip.done{background:var(--done);border-color:var(--done)}
.pip.rest{background:var(--border);border-color:var(--border)}
.week-pct{font-size:10px;color:var(--muted);min-width:28px;text-align:right}
.week-chevron{font-size:10px;color:var(--muted);transition:transform .2s}
.week-chevron.open{transform:rotate(180deg)}
.week-complete .week-header{background:#f0fdf4}

.week-days{display:none;border-top:1px solid var(--border)}
.week-days.open{display:block}
.day-row{display:flex;align-items:flex-start;gap:.75rem;padding:.875rem 1rem;border-bottom:1px solid var(--border);transition:background .1s;cursor:pointer}
.day-row:last-child{border-bottom:none}
.day-row.completed{background:#fafffe}
.day-row.rest-day{opacity:.6;cursor:default}

.day-check{width:20px;height:20px;border-radius:4px;border:1.5px solid var(--border);background:#fff;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:11px}
.day-check:hover{border-color:var(--done)}
.day-check.checked{background:var(--done);border-color:var(--done);color:#fff}
.day-check.rest-check{cursor:default;background:var(--rest-bg)}

.day-info{flex:1;min-width:0}
.day-name-label{font-size:10px;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;margin-bottom:3px}
.day-title{font-size:13px;font-weight:500;line-height:1.3}
.day-detail{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.5}

.disc-badge{font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:2px 7px;border-radius:3px;font-weight:500;flex-shrink:0;margin-top:3px}
.badge-swim{background:var(--swim-bg);color:var(--swim)}
.badge-bike{background:var(--bike-bg);color:var(--bike)}
.badge-run{background:var(--run-bg);color:var(--run)}
.badge-str{background:var(--str-bg);color:var(--str)}
.badge-brick{background:var(--brick-bg);color:var(--brick)}
.badge-rest{background:var(--rest-bg);color:var(--rest)}
.badge-race{background:var(--race-bg);color:var(--race)}

.race-day-card{background:var(--ink);color:#fff;border-radius:8px;padding:2rem;text-align:center;margin:1.5rem 0}
.race-day-card h2{font-family:'Fraunces',serif;font-size:1.5rem;margin-bottom:.5rem}
.race-day-card p{font-size:12px;color:rgba(255,255,255,.6)}

/* strength tab */
.str-card{border:1px solid var(--border);border-radius:6px;margin-bottom:.75rem;overflow:hidden}
.str-card-hdr{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1rem;background:#fff;cursor:pointer}
.str-card-hdr:hover{background:var(--cream)}
.str-body{display:none;border-top:1px solid var(--border)}
.str-body.open{display:block}
.str-session-hdr{display:flex;align-items:center;gap:.75rem;padding:.65rem 1rem;background:var(--cream);border-bottom:1px solid var(--border)}
.str-session-title{font-size:12px;font-weight:500}
.str-session-sub{font-size:10px;color:var(--muted)}
.str-ex-row{display:grid;grid-template-columns:2fr 1fr 2fr;gap:8px;padding:.6rem 1rem .6rem 2.75rem;border-bottom:1px solid var(--border);align-items:start}
.str-ex-row:last-child{border-bottom:none}
.str-ex-name{font-size:12px;font-weight:500}
.str-ex-note{font-size:10px;color:var(--muted);margin-top:1px}
.str-sets{font-size:11px;color:var(--muted)}
.str-cue{font-size:11px;color:var(--muted);line-height:1.5}
.str-badge{font-size:9px;letter-spacing:.08em;text-transform:uppercase;padding:2px 6px;border-radius:3px;font-weight:500;display:inline-block;margin-top:2px}
.str-lower{background:#eff6ff;color:#1d4ed8}
.str-upper{background:#f5f3ff;color:#7c3aed}
.str-core{background:#f0fdf4;color:#16a34a}
.str-complete .str-card-hdr{background:#f0fdf4}

/* past phase weeks are greyed */
.week.past .week-header{opacity:.7}

@media(max-width:600px){
  header,.progress-section,.phase-nav,main{padding-left:1rem;padding-right:1rem}
  .progress-stats{gap:1rem}
  .str-ex-row{grid-template-columns:1fr 1fr}
  .str-cue{display:none}
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="race-label">Sprint Triathlon — Bek</div>
    <h1>12 Weeks to <em>race day</em></h1>
    <div class="header-meta">
      <span><strong>Sept 12, 2026</strong> race date</span>
      <span><strong>750m</strong> swim</span>
      <span><strong>20km</strong> bike</span>
      <span><strong>5km</strong> run</span>
      <span><strong>5 days/wk</strong></span>
      <span class="header-tag">base done ✓</span>
    </div>
  </div>
</header>

<div class="cd-bar">
  <div class="cd-inner">
    <div class="cd-digits">
      <div class="cd-unit"><div class="cd-num" id="cd-d">--</div><span class="cd-lbl">days</span></div>
      <div class="cd-colon">:</div>
      <div class="cd-unit"><div class="cd-num" id="cd-h">--</div><span class="cd-lbl">hrs</span></div>
      <div class="cd-colon">:</div>
      <div class="cd-unit"><div class="cd-num" id="cd-m">--</div><span class="cd-lbl">min</span></div>
      <div class="cd-colon">:</div>
      <div class="cd-unit"><div class="cd-num" id="cd-s">--</div><span class="cd-lbl">sec</span></div>
    </div>
    <div class="cd-phase-text">Now in: <strong id="cd-phase">—</strong> &nbsp;·&nbsp; <span id="cd-week"></span></div>
  </div>
</div>

<div class="progress-section">
  <div class="progress-inner">
    <div class="progress-stats">
      <span><strong id="stat-done">0</strong>workouts done</span>
      <span><strong id="stat-total">0</strong>total workouts</span>
      <span><strong id="stat-pct">0%</strong>complete</span>
      <span><strong id="stat-weeks">0</strong>weeks finished</span>
    </div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="main-bar" style="width:0%"></div></div>
    <div class="disc-bars">
      <div class="disc-bar"><span>🏊</span><div class="disc-bar-track"><div class="disc-bar-fill" id="bar-swim" style="width:0%;background:var(--swim)"></div></div><span id="lbl-swim">0%</span></div>
      <div class="disc-bar"><span>🚴</span><div class="disc-bar-track"><div class="disc-bar-fill" id="bar-bike" style="width:0%;background:var(--bike)"></div></div><span id="lbl-bike">0%</span></div>
      <div class="disc-bar"><span>🏃</span><div class="disc-bar-track"><div class="disc-bar-fill" id="bar-run" style="width:0%;background:var(--run)"></div></div><span id="lbl-run">0%</span></div>
      <div class="disc-bar"><span>💪</span><div class="disc-bar-track"><div class="disc-bar-fill" id="bar-str" style="width:0%;background:var(--str)"></div></div><span id="lbl-str">0%</span></div>
    </div>
  </div>
</div>

<div class="phase-nav">
  <div class="phase-nav-inner">
    <button class="phase-btn active" onclick="showPhase(0)">Base (done ✓)</button>
    <button class="phase-btn" onclick="showPhase(1)">Build 1</button>
    <button class="phase-btn" onclick="showPhase(2)">Build 2</button>
    <button class="phase-btn" onclick="showPhase(3)">Peak + Taper</button>
    <button class="phase-btn" onclick="showStrength()">Strength Log</button>
  </div>
</div>

<main id="main-content"></main>

<script>
const RACE   = new Date('2026-09-12T07:00:00');
const PLAN_START = new Date('2026-05-25'); // base phase started ~May 25
const BUILD_START = new Date('2026-06-22');
const LSKEY  = 'bek_tri_v5';

const WEEKS = [
  // ── PHASE 0: BASE (already done) ─────────────────────────────────────────
  {num:1, dates:'May 25 – May 31', phase:0,
   note:'Week 1 — getting comfortable in the water. Walk/run only on the run.',
   sessions:[
    {disc:'swim', day:'Mon', title:'First swim', detail:'20–25 min easy. Just get in the water. Drills or freestyle, no pressure.'},
    {disc:'run',  day:'Tue', title:'Walk/run', detail:'20 min. Walk/run intervals. Flat terrain. Easy effort.'},
    {disc:'bike', day:'Wed', title:'Easy ride', detail:'45 min easy, conversational pace.'},
    {disc:'swim', day:'Fri', title:'Easy swim', detail:'25 min. Try to go a bit farther than Monday.'},
    {disc:'run',  day:'Sat', title:'Walk/run', detail:'25 min. Same effort as Tuesday.'},
    {disc:'bike', day:'Sun', title:'Longer ride', detail:'60 min easy. Keep it steady.'},
  ]},
  {num:2, dates:'Jun 1 – Jun 7', phase:0,
   note:'Week 2 — try first continuous 100m swim. Runs getting a little longer.',
   sessions:[
    {disc:'swim', day:'Mon', title:'Swim + 100m try', detail:'30 min. Drills then attempt 100m continuous. If not yet, keep building.'},
    {disc:'run',  day:'Tue', title:'Walk/run', detail:'25 min. A little less walking this week.'},
    {disc:'bike', day:'Wed', title:'Easy ride', detail:'50 min. Relaxed effort.'},
    {disc:'swim', day:'Fri', title:'Easy swim', detail:'30 min. Aim for two 100m continuous efforts.'},
    {disc:'run',  day:'Sat', title:'Walk/run', detail:'30 min. Walk only if needed.'},
    {disc:'bike', day:'Sun', title:'Longer ride', detail:'65 min easy.'},
  ]},
  {num:3, dates:'Jun 8 – Jun 14', phase:0,
   note:'Week 3 — first brick workout. Running is starting to feel like running.',
   sessions:[
    {disc:'swim', day:'Mon', title:'Swim sets', detail:'400m total. Try a 200m continuous stretch.'},
    {disc:'run',  day:'Tue', title:'Easy run', detail:'25 min. More running than walking now.'},
    {disc:'bike', day:'Wed', title:'Tempo ride', detail:'50 min. Include one 10 min moderate effort section.'},
    {disc:'swim', day:'Fri', title:'Open water or pool', detail:'30 min. If open water is available, go there.'},
    {disc:'brick',day:'Sat', title:'First brick', detail:'45 min bike immediately into 10 min run. Notice the jelly legs — that feeling goes away.'},
    {disc:'run',  day:'Sun', title:'Easy run', detail:'25 min easy. Recovery effort only.'},
  ]},
  {num:4, dates:'Jun 15 – Jun 21', phase:0,
   note:'Week 4 — light recovery week before the build phase starts. Good work getting here.',
   sessions:[
    {disc:'swim', day:'Mon', title:'Easy swim', detail:'25 min. Technique focus, no intensity.'},
    {disc:'run',  day:'Tue', title:'Easy run', detail:'20 min easy. Let the body absorb the last 3 weeks.'},
    {disc:'bike', day:'Wed', title:'Easy spin', detail:'45 min. Genuinely easy — recovery ride.'},
    {disc:'swim', day:'Fri', title:'Technique swim', detail:'25 min. Focus on breathing rhythm and hand entry.'},
    {disc:'run',  day:'Sat', title:'Easy run', detail:'25 min easy.'},
    {disc:'bike', day:'Sun', title:'Moderate ride', detail:'55 min. Keep it easy but feel free to ride comfortably.'},
  ]},

  // ── PHASE 1: BUILD 1 ──────────────────────────────────────────────────────
  {num:5, dates:'Jun 22 – Jun 28', phase:1,
   note:'Build 1 starts. Brick workouts get longer. Swim pushing toward 500m continuous.',
   sessions:[
    {disc:'swim', day:'Mon', title:'Swim sets', detail:'500m total. Warm up 100m, then 3×100m with 30s rest, cool down 100m. Aim to feel the pace difference.'},
    {disc:'str',  day:'Mon', title:'Strength A', detail:'Goblet squat 3×12 · Single-leg RDL 3×10 ea · Hip thrust 3×15 · Lateral band walk 2×20 · Dead bug 3×10 · Calf raise 3×15'},
    {disc:'run',  day:'Tue', title:'Easy run', detail:'25 min easy. Zone 2. Conversational — if you can\'t hold a sentence, slow down.'},
    {disc:'bike', day:'Wed', title:'Tempo ride', detail:'55 min. Warm up 15 min, 2×10 min moderate-hard effort, 5 min easy between, cool down.'},
    {disc:'swim', day:'Thu', title:'Open water', detail:'500m if possible. Practice sighting every 8–10 strokes. If pool only, 500m easy continuous.'},
    {disc:'str',  day:'Thu', title:'Strength B', detail:'DB row 3×12 ea · Push-up or DB press 3×10 · Pallof press 3×12 ea · Step-up with knee drive 3×10 · Band pull-apart 3×15 · Plank 3×30s'},
    {disc:'brick',day:'Sat', title:'Brick', detail:'55 min bike + 12 min run. Focus on quick transition — helmet off, shoes on, go.'},
    {disc:'run',  day:'Sun', title:'Longer run', detail:'30 min easy. This is where the run base gets built — stay easy.'},
  ]},
  {num:6, dates:'Jun 29 – Jul 5', phase:1,
   note:'Week 6 — 500m swim goal this week. Brick run getting longer.',
   sessions:[
    {disc:'swim', day:'Mon', title:'500m continuous attempt', detail:'Warm up 100m easy, then attempt 500m without stopping. If you need to break it, do 2×250m. Keep pace very comfortable.'},
    {disc:'str',  day:'Mon', title:'Strength A', detail:'Goblet squat 3×12 · Single-leg RDL 3×10 ea · Hip thrust 3×15 · Lateral band walk 2×20 · Dead bug 3×10 · Calf raise 3×15'},
    {disc:'run',  day:'Tue', title:'Easy run', detail:'28 min easy. Same effort as last week — building duration not intensity.'},
    {disc:'bike', day:'Wed', title:'Interval ride', detail:'60 min. Warm up 15 min, 3×8 min harder effort with 4 min easy between, cool down.'},
    {disc:'swim', day:'Thu', title:'Endurance swim', detail:'600m. Easy effort throughout. You\'re already at race distance — now it\'s about comfort.'},
    {disc:'str',  day:'Thu', title:'Strength B', detail:'DB row 3×12 ea · Push-up or DB press 3×10 · Pallof press 3×12 ea · Step-up with knee drive 3×10 · Band pull-apart 3×15 · Plank 3×30s'},
    {disc:'brick',day:'Sat', title:'Brick', detail:'60 min bike + 15 min run. Jelly legs should be noticeably less than week 3.'},
    {disc:'run',  day:'Sun', title:'Longer run', detail:'33 min easy.'},
  ]},
  {num:7, dates:'Jul 6 – Jul 12', phase:1,
   note:'Recovery week — pull back 20%. Let the adaptations settle before Build 2.',
   sessions:[

    {disc:'str',  day:'Mon', title:'Strength A (light)', detail:'Reduce weight ~10%. Goblet squat 2×12 · Hip thrust 2×15 · Dead bug 2×10 · Calf raise 2×15'},
    {disc:'run',  day:'Tue', title:'Easy run', detail:'22 min easy. Recovery week — go slower than feels right.'},

  // ── PHASE 2: BUILD 2 ──────────────────────────────────────────────────────

    {disc:'bike', day:'Sat', title:'Race-pace ride', detail:'75 min. Last 30 min at race effort — practice pushing when tired.'},

  {num:9, dates:'Jul 20 – Jul 26', phase:2,
   note:'Week 9 — practice transitions at home. Time yourself. Every second in T1/T2 is free time.',
   sessions:[
    {disc:'swim', day:'Mon', title:'Open water', detail:'650m. Practice getting in and starting without hesitation. Start at the back or edge to avoid the washing machine start.'},
    {disc:'str',  day:'Mon', title:'Strength A', detail:'Goblet squat 3×12 · Single-leg RDL 3×10 ea · Hip thrust 3×15 · Lateral band walk 2×20 · Dead bug 3×10 · Calf raise 3×15'},
    {disc:'run',  day:'Tue', title:'Tempo run', detail:'33 min. Warm up 10 min, 13 min tempo effort, cool down 10 min.'},
    {disc:'brick',day:'Wed', title:'Brick', detail:'75 min bike + 20 min run. Practice a fast transition between them at home this week.'},
    {disc:'swim', day:'Thu', title:'Pool sets', detail:'650m total. Warm up 100m, 3×150m with 25s rest, cool down 100m.'},
    {disc:'str',  day:'Thu', title:'Strength B', detail:'DB row 3×12 ea · Push-up or DB press 3×10 · Pallof press 3×12 ea · Step-up with knee drive 3×10 · Band pull-apart 3×15 · Plank 3×30s'},
    {disc:'bike', day:'Sat', title:'Race-pace ride', detail:'80 min. Includes 20 min at race effort.'},
    {disc:'run',  day:'Sun', title:'Longer run', detail:'44 min easy.'},
  ]},
  {num:10, dates:'Jul 27 – Aug 2', phase:2,
   note:'Mock triathlon this week — the full thing at slightly shorter distances. Race-day practice.',

// ── state ────────────────────────────────────────────────────────────────
let state = {sessions:{}, strength:{}};
function load(){try{const v=localStorage.getItem(LSKEY);if(v)state=JSON.parse(v);}catch(e){}}
function save(){try{localStorage.setItem(LSKEY,JSON.stringify(state));}catch(e){}}
function sid(wn,si){return `w${wn}_s${si}`}

// ── countdown ─────────────────────────────────────────────────────────────
function p(n){return String(n).padStart(2,'0')}
function tick(){
  const diff=RACE-new Date();
  if(diff<=0){['d','h','m','s'].forEach(x=>document.getElementById('cd-'+x).textContent='00');return;}
  document.getElementById('cd-d').textContent=p(Math.floor(diff/86400000));
  document.getElementById('cd-h').textContent=p(Math.floor(diff%86400000/3600000));
  document.getElementById('cd-m').textContent=p(Math.floor(diff%3600000/60000));
  document.getElementById('cd-s').textContent=p(Math.floor(diff%60000/1000));
  const elapsed=new Date()-BUILD_START;
  const wkNum=Math.max(1,Math.min(10,Math.floor(elapsed/604800000)+1));
  const phases=['Build 1','Build 1','Build 1','Build 2','Build 2','Build 2','Peak + Taper','Peak + Taper','Peak + Taper','Peak + Taper'];
  document.getElementById('cd-phase').textContent=phases[wkNum-1]||'Race Week';
  document.getElementById('cd-week').textContent=`Week ${wkNum+4} of 14`;
}

// ── stats ─────────────────────────────────────────────────────────────────
function updateStats(){
  let total=0, done=0, byDisc={swim:0,bike:0,run:0,str:0}, totDisc={swim:0,bike:0,run:0,str:0};
  WEEKS.forEach(w=>w.sessions.forEach((s,i)=>{
    if(s.disc==='rest') return;
    total++;
    const d=s.disc==='brick'?'bike':(s.disc==='race'?'run':s.disc);
    if(totDisc[d]!==undefined) totDisc[d]++;
    if(state.sessions[sid(w.num,i)]){done++;if(byDisc[d]!==undefined)byDisc[d]++;}
  }));
  let strTotal=0,strDone=0;
  WEEKS.forEach(w=>w.sessions.forEach((s,i)=>{if(s.disc==='str'){strTotal++;if(state.sessions[sid(w.num,i)])strDone++;}}));
  document.getElementById('stat-done').textContent=done;
  document.getElementById('stat-total').textContent=total;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('stat-pct').textContent=pct+'%';
  document.getElementById('main-bar').style.width=pct+'%';
  const finWks=WEEKS.filter(w=>w.sessions.filter((_,i)=>state.sessions[sid(w.num,i)]).length===w.sessions.filter(s=>s.disc!=='rest').length).length;
  document.getElementById('stat-weeks').textContent=finWks;
  ['swim','bike','run'].forEach(d=>{
    const p=totDisc[d]?Math.round(byDisc[d]/totDisc[d]*100):0;
    document.getElementById('bar-'+d).style.width=p+'%';
    document.getElementById('lbl-'+d).textContent=p+'%';
  });
  const sp=strTotal?Math.round(strDone/strTotal*100):0;
  document.getElementById('bar-str').style.width=sp+'%';
  document.getElementById('lbl-str').textContent=sp+'%';
}

// ── phase nav ─────────────────────────────────────────────────────────────
let currentView = 'phase';
let currentPhase = 0;

function showPhase(ph){
  currentView='phase'; currentPhase=ph;
  document.querySelectorAll('.phase-btn').forEach((b,i)=>b.classList.toggle('active',i===ph));
  renderPhase(ph);
}
function showStrength(){
  currentView='strength';
  document.querySelectorAll('.phase-btn').forEach((b,i)=>b.classList.toggle('active',i===4));
  renderStrength();
}

// ── render phase ──────────────────────────────────────────────────────────
const PHASE_NOTES = [
  '<strong>Base phase — complete.</strong> Four weeks of building the habit and getting comfortable across all three sports. The bike fitness was already there. Swim and run are now established. These weeks count.',
  '<strong>Build 1 (weeks 5–7).</strong> Brick workouts, longer swims, and the first strength sessions. Two swims and two strength sessions per week. Keep the runs genuinely easy — HR will be higher than ideal, that\'s normal for now.',
  '<strong>Build 2 (weeks 8–10).</strong> Race-specific prep. Open water every swim. Transitions matter now. Mock triathlon in week 10. This is the hardest block.',
  '<strong>Peak + Taper (weeks 11–14).</strong> Highest volume in week 11, then a steady step down. Do not add workouts during taper. The fitness is banked — trust it.',
];

const DISC_BADGE = {
  swim:'badge-swim', bike:'badge-bike', run:'badge-run',
  str:'badge-str', brick:'badge-brick', rest:'badge-rest', race:'badge-race'
};
const DISC_LABEL = {
  swim:'Swim', bike:'Bike', run:'Run', str:'Strength',
  brick:'Brick', rest:'Rest', race:'Race day'
};

function renderPhase(ph){
  const mc=document.getElementById('main-content');
  const phWeeks=WEEKS.filter(w=>w.phase===ph);
  let html=`<div class="phase-note">${PHASE_NOTES[ph]}</div>`;

  phWeeks.forEach(w=>{
    const sessCount=w.sessions.filter(s=>s.disc!=='rest').length;
    const doneSess=w.sessions.filter((s,i)=>s.disc!=='rest'&&state.sessions[sid(w.num,i)]).length;
    const pct=sessCount?Math.round(doneSess/sessCount*100):0;
    const complete=pct===100;
    const past=ph===0;

    html+=`<div class="week${complete?' week-complete':''}${past?' past':''}" id="wk-${w.num}">
      <div class="week-header" onclick="toggleWeek(${w.num})">
        <div>
          <div class="week-label">Week ${w.num} ${past?'<span style="font-size:9px;color:var(--done);letter-spacing:.06em">✓ done</span>':''}</div>
          <div class="week-dates">${w.dates}</div>
        </div>
        <div class="week-progress">
          <div class="week-pips">${w.sessions.map((s,i)=>{
            const d=s.disc==='rest';
            const ck=state.sessions[sid(w.num,i)];
            return`<div class="pip${d?' rest':ck?' done':''}"></div>`;
          }).join('')}</div>
          <div class="week-pct">${pct}%</div>
          <div class="week-chevron${ph===0?' open':''}" id="chev-${w.num}">▾</div>
        </div>
      </div>
      <div class="week-days${ph===0?' open':''}" id="wd-${w.num}">
        ${w.sessions.map((s,i)=>{
          const ck=state.sessions[sid(w.num,i)];
          const isRest=s.disc==='rest';
          return`<div class="day-row${ck?' completed':''}${isRest?' rest-day':''}" onclick="${isRest?'':('toggleSess('+w.num+','+i+')')}">
            <div class="day-check${ck?' checked':''}${isRest?' rest-check':''}">${ck?'✓':''}</div>
            <div class="day-info">
              <div class="day-name-label">${s.day||''}</div>
              <div class="day-title">${s.title}</div>
              <div class="day-detail">${s.detail}</div>
            </div>
            <div class="disc-badge ${DISC_BADGE[s.disc]||''}">${DISC_LABEL[s.disc]||s.disc}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  });

  mc.innerHTML=html;
}

function toggleWeek(n){
  const wd=document.getElementById('wd-'+n);
  const ch=document.getElementById('chev-'+n);
  const open=wd.classList.toggle('open');
  ch.classList.toggle('open',open);
  ch.textContent='▾';
}

function toggleSess(wn,si){
  const k=sid(wn,si);
  state.sessions[k]=!state.sessions[k];
  // update pip
  const wkEl=document.getElementById('wk-'+wn);
  const pips=wkEl.querySelectorAll('.pip');
  const w=WEEKS.find(x=>x.num===wn);
  if(w){
    w.sessions.forEach((s,i)=>{
      if(pips[i]){
        pips[i].classList.toggle('done',!!state.sessions[sid(wn,i)]);
      }
    });
    const sessCount=w.sessions.filter(s=>s.disc!=='rest').length;
    const doneSess=w.sessions.filter((s,i)=>s.disc!=='rest'&&state.sessions[sid(w.num,i)]).length;
    const pct=sessCount?Math.round(doneSess/sessCount*100):0;
    wkEl.querySelector('.week-pct').textContent=pct+'%';
    wkEl.classList.toggle('week-complete',pct===100);
  }
  // update day row
  const rows=wkEl.querySelectorAll('.day-row');
  const row=rows[si];
  if(row){
    const ck=state.sessions[k];
    row.classList.toggle('completed',ck);
    const cb=row.querySelector('.day-check');
    cb.classList.toggle('checked',ck);
    cb.textContent=ck?'✓':'';
  }
  updateStats(); save();
}

// ── strength ──────────────────────────────────────────────────────────────
function renderStrength(){
  const mc=document.getElementById('main-content');
  let html=`<div class="phase-note">2× per week — Session A and B, alternating. Paired with swim days. Keep it 30–40 min. Drop to 1× in weeks 12–13. Never the day before a long brick.</div>`;

  // Session reference cards
  STRENGTH_SESSIONS.forEach(sess=>{
    html+=`<div class="str-card">
      <div class="str-card-hdr" onclick="toggleStrCard('sc-${sess.id}')">
        <div><div class="str-session-title">${sess.name}</div></div>
        <span style="font-size:10px;color:var(--muted)">▾</span>
      </div>
      <div class="str-body open" id="sc-${sess.id}">
        <div style="display:grid;grid-template-columns:2fr 1fr 2fr;gap:8px;padding:.5rem 1rem .5rem 2.75rem;border-bottom:1px solid var(--border)">
          <span style="font-size:10px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase">Exercise</span>
          <span style="font-size:10px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase">Sets</span>
          <span style="font-size:10px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase">Cue</span>
        </div>
        ${sess.exercises.map(ex=>`
        <div class="str-ex-row">
          <div class="str-ex-name">${ex.name}</div>
          <div class="str-sets">${ex.sets}</div>
          <div class="str-cue">${ex.cue}</div>
        </div>`).join('')}
      </div>
    </div>`;
  });

  // Scheduled session log
  html+=`<div class="phase-note" style="margin-top:1.5rem"><strong>Session log</strong> — check off each strength session as you complete it.</div>`;
  const now=new Date();
  const rows=[];
  for(let d=new Date('2026-06-22');d<=now;d.setDate(d.getDate()+1)){
    if(d.getDay()===1||d.getDay()===4) rows.push(new Date(d));
  }
  const upcoming=[];
  for(let d=new Date(now.getTime()+86400000);upcoming.length<6;d.setDate(d.getDate()+1)){
    if(d.getDay()===1||d.getDay()===4) upcoming.push(new Date(d));
  }
  const all=[...rows.slice(-10).reverse(),...upcoming].map((d,i)=>{
    const key='str_'+d.toISOString().slice(0,10);
    const ck=!!state.strength[key];
    const isFuture=d>now;
    const ds=d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
    const isA=i%2===0;
    return`<div class="str-card${ck?' str-complete':''}">
      <div class="str-card-hdr" style="cursor:default">
        <div>
          <div class="str-session-title">Session ${isA?'A':'B'} &nbsp;<span style="font-size:10px;color:var(--muted)">${ds}</span>${isFuture?' <span style="font-size:9px;color:var(--muted)">(upcoming)</span>':''}</div>
          <div class="str-session-sub">${isA?'Lower body + core':'Upper + rotational core'}</div>
        </div>
        <div class="day-check${ck?' checked':''}" onclick="toggleStr('${key}',this)" style="cursor:pointer;flex-shrink:0">${ck?'✓':''}</div>
      </div>
    </div>`;
  });
  html+=all.join('');
  mc.innerHTML=html;
}

function toggleStrCard(id){
  document.getElementById(id).classList.toggle('open');
}
function toggleStr(key,el){
  state.strength[key]=!state.strength[key];
  const ck=state.strength[key];
  el.classList.toggle('checked',ck);
  el.textContent=ck?'✓':'';
  el.closest('.str-card').classList.toggle('str-complete',ck);
  updateStats(); save();
}

// ── init ──────────────────────────────────────────────────────────────────
load();
tick(); setInterval(tick,1000);
showPhase(0);
updateStats();
</script>
